name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  smoke-tests:
    name: Smoke tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # CPU-only PyTorch wheel keeps install time low on CI
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install -r requirements.txt

      - name: Show installed versions
        run: |
          python -V
          pip list | grep -E 'torch|numpy|scikit|matplotlib|pytest'

      - name: Run smoke tests
        run: pytest tests/ -v --tb=short

      - name: Upload regenerated paper figures
        if: ${{ matrix.python-version == '3.11' }}
        uses: actions/upload-artifact@v4
        with:
          name: paper-figures-py${{ matrix.python-version }}
          path: paper/en/figures/*.pdf
          retention-days: 14
